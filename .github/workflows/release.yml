name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x86
        shell: pwsh
        run: msbuild .\folder-size-ranker-cli.vcxproj /t:Build /p:Configuration=Release /p:Platform=Win32 /m

      - name: Build Release x64
        shell: pwsh
        run: msbuild .\folder-size-ranker-cli.vcxproj /t:Build /p:Configuration=Release /p:Platform=x64 /m

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\artifacts -Force | Out-Null
          Copy-Item .\x86\Release\folder-size-ranker-cli.exe .\artifacts\folder-size-ranker-cli-x86.exe -Force
          Copy-Item .\x64\Release\folder-size-ranker-cli.exe .\artifacts\folder-size-ranker-cli-x64.exe -Force

      - name: Read annotated tag notes
        id: tag_notes
        shell: pwsh
        run: |
          $gitPath = Get-Command git -CommandType Application | Select-Object -First 1 -ExpandProperty Source
          if ([string]::IsNullOrWhiteSpace($gitPath)) {
            throw '无法定位 git.exe'
          }

          $remoteTagRef = "refs/tags/$env:GITHUB_REF_NAME"
          $localTagRef = 'refs/codex/release_tag'
          git update-ref -d $localTagRef 2>$null
          & $gitPath fetch --force origin "+$remoteTagRef:$localTagRef"
          if ($LASTEXITCODE -ne 0) {
            throw "无法从 origin 获取 tag: $env:GITHUB_REF_NAME"
          }

          $tagType = & $gitPath cat-file -t $localTagRef
          if ($LASTEXITCODE -ne 0) {
            throw "无法读取 tag 对象: $env:GITHUB_REF_NAME"
          }
          $tagType = ($tagType | Out-String).Trim()
          if ($tagType -ne 'tag') {
            throw "发布必须使用 annotated tag。$env:GITHUB_REF_NAME 当前不是 annotated tag。"
          }

          $notesPath = Join-Path $PWD 'tag-notes.txt'
          $notesErrorPath = Join-Path $PWD 'tag-notes.stderr.txt'
          Remove-Item $notesPath, $notesErrorPath -ErrorAction SilentlyContinue

          & $gitPath for-each-ref $localTagRef '--format=%(contents)' 1> $notesPath 2> $notesErrorPath
          if ($LASTEXITCODE -ne 0) {
            $stderr = if (Test-Path $notesErrorPath) {
              [System.IO.File]::ReadAllText($notesErrorPath, [System.Text.UTF8Encoding]::new($false))
            } else {
              ''
            }
            throw "无法读取 annotated tag 说明: $env:GITHUB_REF_NAME`n$stderr"
          }

          $notes = if (Test-Path $notesPath) {
            [System.IO.File]::ReadAllText($notesPath, [System.Text.UTF8Encoding]::new($false))
          } else {
            ''
          }
          if ([string]::IsNullOrWhiteSpace($notes)) {
            throw "annotated tag 说明不能为空: $env:GITHUB_REF_NAME"
          }

          $delimiter = [guid]::NewGuid().ToString('N')
          $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "body<<$delimiter`n", $utf8NoBom)
          [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, $notes, $utf8NoBom)
          if ($notes.EndsWith("`n")) {
            [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "$delimiter`n", $utf8NoBom)
          } else {
            [System.IO.File]::AppendAllText($env:GITHUB_OUTPUT, "`n$delimiter`n", $utf8NoBom)
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.tag_notes.outputs.body }}
          files: |
            artifacts/folder-size-ranker-cli-x86.exe
            artifacts/folder-size-ranker-cli-x64.exe
